<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMA EEW Widget - Optimized Control Version</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; background-color: transparent; overflow: hidden; font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
        #eew-container { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); display: flex; width: 1100px; height: 360px; box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.4); border: 2px solid #666; opacity: 0; transition: opacity 0.5s ease-in-out; background-color: rgba(0, 0, 0, 0.85); }
        #eew-container.active { opacity: 1; }
        #map-pane { width: 270px; height: 360px; background-color: #002060; position: relative; overflow: hidden; border-right: 2px solid #666; flex-shrink: 0; }
        svg { width: 100%; height: 100%; }
        .jma-region { fill: #757575; stroke: #444; stroke-width: 0.5px; }
        .jma-region.alert { fill: #FFFF00; }
        #info-pane { width: 830px; background-color: rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        #header { background-color: #cc0000; color: white; text-align: center; font-size: 3rem; font-weight: 900; padding: 5px 0; letter-spacing: 5px; flex-shrink: 0; }
        #subheader { padding: 20px 40px 10px 40px; color: #ffff00; font-size: 1.6rem; font-weight: bold; flex-shrink: 0; }
        #region-list { margin: 0 40px 20px 40px; padding-right: 15px; color: white; font-size: 2rem; font-weight: bold; line-height: 1.6; display: block; overflow-y: auto; overflow-x: hidden; height: 210px; word-break: keep-all; box-sizing: border-box; }
        #region-list span { display: inline-block; margin-right: 18px; margin-bottom: 8px; white-space: nowrap; }
        #debug-trigger { position: absolute; top: 20px; right: 20px; width: 140px; height: 50px; background-color: #000; color: #fff; border: 2px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; z-index: 9999; }
        #debug-menu { position: absolute; top: 80px; right: 20px; width: 450px; background: rgba(0,0,0,0.9); color: white; padding: 20px; display: none; border: 1px solid #777; z-index: 9998; }
        #debug-menu.active { display: block; }
        .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #ff4444; margin-right: 8px; box-shadow: 0 0 5px #ff4444; }
        .status-dot.connected { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        textarea { width: 100%; height: 60px; background: #222; color: #0f0; font-family: monospace; font-size: 11px; margin-top: 5px; }
        .debug-btn { background: #0070c0; color: white; border: none; padding: 6px 10px; cursor: pointer; border-radius: 4px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="eew-container">
        <div id="map-pane"><div id="map-status" style="color:white; font-size:12px; text-align:center; padding-top:50%;">[Map Standby]</div></div>
        <div id="info-pane">
            <div id="header">긴급지진속보(JMA)</div>
            <div id="subheader"><span id="epicenter-name">지진 발생</span> 강한 흔들림에 주의</div>
            <div id="region-list"></div>
        </div>
    </div>

    <div id="debug-trigger">DEBUG MENU</div>
    <div id="debug-menu">
        <div style="margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #444;">
            <strong>통신 제어:</strong><br>
            <span id="ws-dot" class="status-dot"></span><span id="ws-status">대기 중...</span><br>
            <button class="debug-btn" onclick="connectWebSocket()">연결 시작</button>
            <button class="debug-btn" style="background:#555" onclick="disconnectWebSocket()">연결 해제</button>
        </div>
        <div style="margin-bottom:15px;"><strong>1. Map Setup:</strong> <input type="file" id="map-loader" accept=".json, .geojson"></div>
        <div style="margin-bottom:15px;">
            <strong>2. EEW Test:</strong> <input type="file" id="file-loader" accept=".xml">
            <textarea id="xml-input"><Report><Body><Earthquake><Hypocenter><Area><Name>能登半島沖</Name><Coordinate>+37.5+137.3-10000/</Coordinate></Area></Hypocenter></Earthquake><Warning><Pref><Name>石川県</Name><Code>9170</Code></Pref><Pref><Name>富山県</Name><Code>9160</Code></Pref></Warning></Body></Report></textarea>
            <button class="debug-btn" id="btn-inject">Inject</button>
        </div>
        <button class="debug-btn" style="background:#cc0000" onclick="document.getElementById('eew-container').classList.remove('active')">Hide Widget</button>
    </div>

    <script>
        const GOOGLE_API_URL = "https://script.google.com/macros/s/여기에_본인의_주소를_넣으세요/exec";

        // (지역 데이터 REGIONAL_HIERARCHY, ISLAND_REGIONS는 이전 코드와 동일하여 생략 - 실제 파일에는 그대로 두세요)
        // ... 생략된 지역 데이터 ...

        let activeWebSocket = null;
        let isIntentionalDisconnect = false;
        
        const wsStatusEl = document.getElementById('ws-status');
        const wsDotEl = document.getElementById('ws-dot');
        const eewContainer = document.getElementById('eew-container');
        const epicenterNameEl = document.getElementById('epicenter-name');
        const regionListEl = document.getElementById('region-list');
        
        let mapProjection = d3.geoIdentity(); 
        let mapPath = d3.geoPath().projection(mapProjection);
        let mapSvg = null, mapGroup = null, baseGeoData = null;

        // 초기화
        initMap();

        function updateStatus(msg, isConnected) {
            wsStatusEl.textContent = msg;
            if (isConnected) wsDotEl.classList.add('connected');
            else wsDotEl.classList.remove('connected');
        }

        // 1. 만능 통신 모듈 (번역 및 티켓)
        function requestViaGoogle(action, additionalParams = "") {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_' + Math.round(100000 * Math.random());
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.head.removeChild(script);
                    resolve(data);
                };
                const script = document.createElement('script');
                script.src = `${GOOGLE_API_URL}?action=${action}&callback=${callbackName}${additionalParams}`;
                script.onerror = () => { delete window[callbackName]; document.head.removeChild(script); reject(new Error("통신 실패")); };
                document.head.appendChild(script);
            });
        }

        // 2. 웹소켓 제어 함수
        async function connectWebSocket() {
            if (activeWebSocket) return; // 이미 연결되어 있으면 중복 실행 방지
            isIntentionalDisconnect = false;
            try {
                updateStatus("티켓 요청 중...", false);
                const data = await requestViaGoogle("getTicket");
                if (!data.ticket) throw new Error("티켓 없음");

                activeWebSocket = new WebSocket(`wss://ws.api.dmdata.jp/v2/websocket?ticket=${data.ticket}`, 'dmdata.v2');
                activeWebSocket.onopen = () => updateStatus("✅ 연결됨", true);
                activeWebSocket.onmessage = (e) => {
                    const payload = JSON.parse(e.data);
                    if (payload.type === 'ping') activeWebSocket.send(JSON.stringify({ type: 'pong', pingId: payload.pingId }));
                    // 여기에 지진 데이터 수신 시 처리 로직 추가 가능
                };
                activeWebSocket.onclose = () => {
                    activeWebSocket = null;
                    if (isIntentionalDisconnect) { updateStatus("연결 해제됨", false); }
                    else { updateStatus("끊김. 재시도 중...", false); setTimeout(connectWebSocket, 5000); }
                };
            } catch (err) { updateStatus("🚨 오류 발생", false); setTimeout(connectWebSocket, 10000); }
        }

        function disconnectWebSocket() {
            if (activeWebSocket) {
                isIntentionalDisconnect = true;
                activeWebSocket.close();
            }
        }

        // 3. 지진 데이터 처리 (번역 비동기 처리 최적화)
        async function processEarthquakeData(dataString) {
            if (!dataString) return;
            
            // UI 초기화 및 위젯 표시 (번역 기다리지 않고 즉시 실행)
            d3.selectAll(".jma-region").classed("alert", false);
            mapGroup.selectAll(".epicenter-marker-group").remove();
            eewContainer.classList.add('active'); 
            epicenterNameEl.textContent = "감지 중..."; // 번역 전 임시 텍스트

            let triggeredCodes = new Set();
            let rawEpicenterText = "미상 지역";
            let epicenterCoords = null;
            let activeFeatures = [];

            // XML 파싱 및 지도 하이라이트 (매우 빠름)
            try {
                const cleanXml = dataString.replace(/(<\/?)[\w\-]+:/g, '$1');
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(cleanXml, "text/xml");
                
                const hypocenterNode = xmlDoc.querySelector("Hypocenter Name");
                if (hypocenterNode) rawEpicenterText = hypocenterNode.textContent;
                
                // 좌표 추출 및 지도 줌 (즉시 실행)
                const coordNode = xmlDoc.querySelector("Coordinate");
                if (coordNode) {
                    const match = coordNode.textContent.match(/([+-]\d+(?:\.\d+)?)([+-]\d+(?:\.\d+)?)/);
                    if (match) {
                        epicenterCoords = [parseFloat(match[2]), parseFloat(match[1])];
                        drawEpicenterMarker(epicenterCoords);
                    }
                }

                xmlDoc.querySelectorAll("Code").forEach(node => {
                    const code = node.textContent.trim();
                    const selection = d3.select("#region-" + code);
                    if (!selection.empty()) {
                        selection.classed("alert", true);
                        triggeredCodes.add(code);
                        activeFeatures.push(selection.datum());
                    }
                });
                
                // 지도 줌 애니메이션 (즉시 실행)
                if (activeFeatures.length > 0 && baseGeoData) {
                    const combined = { type: "FeatureCollection", features: activeFeatures };
                    mapProjection.fitExtent([[30, 30], [240, 330]], combined);
                    mapGroup.selectAll("path.jma-region").transition().duration(800).attr("d", mapPath);
                    if (epicenterCoords) updateMarkerPos(epicenterCoords);
                }
                
                // 지역 리스트 업데이트 (즉시 실행)
                updateRegionListUI(triggeredCodes);

            } catch (e) { console.error(e); }

            // ⚡ 핵심: 번역은 별개의 비동기 흐름으로 돌림 (지도 로딩 방해 금지)
            requestViaGoogle("translate", `&text=${encodeURIComponent(rawEpicenterText)}`)
                .then(data => {
                    epicenterNameEl.textContent = data.translated || rawEpicenterText;
                })
                .catch(() => {
                    epicenterNameEl.textContent = rawEpicenterText;
                });
        }

        // 유틸리티 함수들
        function drawEpicenterMarker(coords) {
            const markerGroup = mapGroup.append("g").attr("class", "epicenter-marker-group");
            markerGroup.append("text").attr("class", "m-stroke").attr("text-anchor", "middle").attr("dominant-baseline", "central").style("fill", "none").style("stroke", "white").style("stroke-width", "1.5px").style("font-size", "22px").style("font-weight", "900").text("✕").attr("x", mapProjection(coords)[0]).attr("y", mapProjection(coords)[1]);
            markerGroup.append("text").attr("class", "m-fill").attr("text-anchor", "middle").attr("dominant-baseline", "central").style("fill", "red").style("font-size", "22px").style("font-weight", "900").text("✕").attr("x", mapProjection(coords)[0]).attr("y", mapProjection(coords)[1]);
        }

        function updateMarkerPos(coords) {
            mapGroup.selectAll(".epicenter-marker-group text").transition().duration(800).attr("x", mapProjection(coords)[0]).attr("y", mapProjection(coords)[1]);
        }

        function initMap() {
            mapSvg = d3.select("#map-pane").append("svg");
            mapGroup = mapSvg.append("g");
        }

        function updateRegionListUI(triggeredCodes) {
            let macroList = []; let subList = [];
            REGIONAL_HIERARCHY.forEach(block => {
                const allCodes = block.prefs.flatMap(p => p.codes);
                const matched = allCodes.filter(c => triggeredCodes.has(c));
                if (matched.length === 0) return;
                if (matched.length === allCodes.length || matched.length >= 5) macroList.push(block.region);
                else {
                    block.prefs.forEach(pref => {
                        const mInPref = pref.codes.filter(c => triggeredCodes.has(c));
                        if (mInPref.length === 0) return;
                        if (mInPref.length === pref.codes.length) subList.push(pref.name);
                        else mInPref.forEach(c => subList.push(pref.sub[c]));
                    });
                }
            });
            regionListEl.innerHTML = [...macroList, ...subList].map(r => `<span>${r}</span>`).join('');
        }

        // 이벤트 바인딩
        document.getElementById('debug-trigger').addEventListener('click', () => document.getElementById('debug-menu').classList.toggle('active'));
        document.getElementById('btn-inject').addEventListener('click', () => processEarthquakeData(document.getElementById('xml-input').value));
        document.getElementById('map-loader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => { try { baseGeoData = JSON.parse(event.target.result); renderMap(baseGeoData); } catch(err) { alert("JSON 에러"); } };
            reader.readAsText(file);
        });
        function renderMap(geoData) {
            document.getElementById('map-status').style.display = "none";
            mapGroup.selectAll("*").remove();
            mapProjection = d3.geoIdentity().reflectY(true).fitExtent([[10, 10], [260, 350]], geoData);
            mapPath = d3.geoPath().projection(mapProjection);
            mapGroup.selectAll("path.jma-region").data(geoData.features).enter().append("path").attr("d", mapPath).attr("class", "jma-region").attr("id", d => "region-" + (d.properties.code || d.properties.id));
        }
    </script>
</body>
</html>
