<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JMA EEW Widget - Ultimate Broadcast Version</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* ========================================= */
        /* 1. 기본 폰트 및 배경 설정 (Noto Sans KR 유지) */
        /* ========================================= */
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; background-color: transparent; overflow: hidden; font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
        
        /* ========================================= */
        /* 2. 📺 상단 자막: 방송국식 레이어드 자막 기법 */
        /* ========================================= */
        #upper-info {
            font-family: 'a견나루', 'Noto Sans KR', sans-serif; 
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 120px; opacity: 0; z-index: 10;
        }
        #upper-info.active { opacity: 1; }
        .upper-box { text-align: left; font-weight: 200; line-height: 1.1; display: flex; flex-direction: column; gap: 8px; }
        
        .text-stack { display: grid; align-items: center; }
        .layer-stroke, .layer-fill { grid-area: 1 / 1; } 
        
        .layer-fill { z-index: 2; }
        .layer-stroke { 
            z-index: 1; color: #000; 
            -webkit-text-stroke: 14px #000; 
            text-shadow: 6px 8px 12px rgba(0,0,0,0.6); 
        }
        
        .u-title { font-size: 3.5rem; letter-spacing: -2px; }
        .u-content { font-size: 3rem; }
        .c-yellow { color: #ffff00; }
        .c-white { color: #ffffff; }

        /* ========================================= */
        /* 3. 🗺️ 하단 자막: 기존 디자인 및 지도 (가운데 정렬) */
        /* ========================================= */
        #eew-container { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); display: flex; width: 1100px; height: 360px; box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.4); border: 2px solid #666; opacity: 0;  background-color: rgba(0, 0, 0, 0.85); z-index: 5; }
        #eew-container.active { opacity: 1; }
        #map-pane { width: 270px; height: 360px; background-color: #002060; position: relative; overflow: hidden; border-right: 2px solid #666; flex-shrink: 0; }
        svg { width: 100%; height: 100%; }
        
        .jma-region { fill: #757575; stroke: #444; stroke-width: 0.5px; }
        .jma-region.alert { fill: #FFFF00 !important; } 

        #info-pane { width: 830px; background-color: rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        #header { background-color: #cc0000; color: white; text-align: center; font-size: 3rem; font-weight: 900; padding: 5px 0; letter-spacing: 5px; }
        #subheader { padding: 20px 40px 10px 40px; color: #ffff00; font-size: 1.6rem; font-weight: bold; }
        #region-list { margin: 0 40px 20px 40px; color: white; font-size: 2rem; font-weight: bold; line-height: 1.6; display: block; overflow-y: auto; height: 210px; word-break: keep-all; }
        #region-list span { display: inline-block; margin-right: 18px; margin-bottom: 8px; white-space: nowrap; }

        /* ========================================= */
        /* 4. 🛠️ 디버그 메뉴 */
        /* ========================================= */
        #debug-trigger { position: absolute; top: 20px; right: 20px; width: 120px; height: 40px; background: #000; color: #fff; border: 1px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 9999; }
        #debug-menu { position: absolute; top: 70px; right: 20px; width: 400px; background: rgba(0,0,0,0.9); color: white; padding: 20px; display: none; border: 1px solid #777; z-index: 9998; }
        #debug-menu.active { display: block; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ff4444; margin-right: 5px; }
        .status-dot.connected { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .debug-btn { background: #0070c0; color: white; border: none; padding: 6px 10px; cursor: pointer; border-radius: 4px; margin: 5px 0; font-family: inherit; font-size: 13px; font-weight: bold; }
        .debug-btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="upper-info">
        <div class="upper-box">
            <div class="text-stack u-title">
                <div class="layer-stroke">긴급지진속보</div>
                <div class="layer-fill c-yellow">긴급지진속보</div>
            </div>
            <div class="text-stack u-content">
                <div class="layer-stroke">규모: <span id="mag-stroke">M0.0</span></div>
                <div class="layer-fill c-white">규모: <span id="mag-fill">M0.0</span></div>
            </div>
        </div>
        <div class="upper-box">
            <div class="text-stack u-title">
                <div class="layer-stroke">강한 흔들림에 경계</div>
                <div class="layer-fill c-yellow">강한 흔들림에 경계</div>
            </div>
            <div class="text-stack u-content">
                <div class="layer-stroke">진원 깊이: <span id="depth-stroke">10km</span></div>
                <div class="layer-fill c-white">진원 깊이: <span id="depth-fill">10km</span></div>
            </div>
        </div>
    </div>

    <div id="eew-container">
        <div id="map-pane"><div id="map-status" style="color:white; font-size:12px; text-align:center; padding-top:50%;">[Map Standby]</div></div>
        <div id="info-pane">
            <div id="header">긴급지진속보(JMA)</div>
            <div id="subheader"><span id="epicenter-name">분석 중...</span>에서 지진 발생, 강한 흔들림에 주의</div>
            <div id="region-list"></div>
        </div>
    </div>

    <div id="debug-trigger">DEBUG MENU</div>
    <div id="debug-menu">
        <div style="margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #444;">
            <strong>통신 제어:</strong><br>
            <span id="ws-dot" class="status-dot"></span><span id="ws-status">대기 중...</span><br>
            <button class="debug-btn" id="btn-connect">연결 시작</button>
            <button class="debug-btn" id="btn-disconnect" style="background:#555">연결 해제</button>
        </div>
        <div style="margin-bottom:15px;">
            <strong>1. Map Setup (GeoJSON):</strong><br>
            <input type="file" id="map-loader" accept=".json, .geojson" style="font-size: 12px; margin-top: 5px; color: white;">
        </div>
        <div style="margin-bottom:15px;">
            <strong>2. EEW Test:</strong>
            <textarea id="xml-input" style="width:100%; height:60px; background:#222; color:#0f0; font-family:monospace; font-size:11px; margin-top:5px;"></textarea>
            <button class="debug-btn" id="btn-inject">Inject Data</button>
        </div>
        <button class="debug-btn" id="btn-hide" style="background:#cc0000">Hide Widgets</button>
    </div>

    <script>
        // ==========================================
        // 🚨 여기에 본인의 데이터(구글 URL, 지역정보)를 채워주세요!
        // ==========================================
       	const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbzPnfrVo-KliILY-YSogjcK6DqEg68vQcFeIsHl3KIdzegYmyc8nlFzpVH-wwTEYEplgw/exec";

        const REGIONAL_HIERARCHY = [
            { region: "홋카이도 지방", prefs: [ { name: "홋카이도", codes: ["9011", "9012", "9013", "9014"], sub: {"9011": "홋카이도 도오", "9012": "홋카이도 도남", "9013": "홋카이도 도북", "9014": "홋카이도 도동"} } ] },
            { region: "도호쿠 지방", prefs: [ { name: "아오모리현", codes: ["9020"], sub: {"9020": "아오모리현"} }, { name: "이와테현", codes: ["9030"], sub: {"9030": "이와테현"} }, { name: "미야기현", codes: ["9040"], sub: {"9040": "미야기현"} }, { name: "아키타현", codes: ["9050"], sub: {"9050": "아키타현"} }, { name: "야마가타현", codes: ["9060"], sub: {"9060": "야마가타현"} }, { name: "후쿠시마현", codes: ["9070"], sub: {"9070": "후쿠시마현"} } ] },
            { region: "간토 지방", prefs: [ { name: "이바라키현", codes: ["9080"], sub: {"9080": "이바라키현"} }, { name: "도치기현", codes: ["9090"], sub: {"9090": "도치기현"} }, { name: "군마현", codes: ["9100"], sub: {"9100": "군마현"} }, { name: "사이타마현", codes: ["9110"], sub: {"9110": "사이타마현"} }, { name: "지바현", codes: ["9120"], sub: {"9120": "지바현"} }, { name: "도쿄도", codes: ["9131", "9132", "9133"], sub: {"9131": "도쿄", "9132": "이즈 제도", "9133": "오가사와라"} }, { name: "가나가와현", codes: ["9140"], sub: {"9140": "가나가와현"} } ] },
            { region: "주부 지방", prefs: [ { name: "니이가타현", codes: ["9150"], sub: {"9150": "니이가타현"} }, { name: "도야마현", codes: ["9160"], sub: {"9160": "도야마현"} }, { name: "이시카와현", codes: ["9170"], sub: {"9170": "이시카와현"} }, { name: "후쿠이현", codes: ["9180"], sub: {"9180": "후쿠이현"} }, { name: "야마나시현", codes: ["9190"], sub: {"9190": "야마나시현"} }, { name: "나가노현", codes: ["9200"], sub: {"9200": "나가노현"} }, { name: "기후현", codes: ["9210"], sub: {"9210": "기후현"} }, { name: "시즈오카현", codes: ["9220"], sub: {"9220": "시즈오카현"} }, { name: "아이치현", codes: ["9230"], sub: {"9230": "아이치현"} } ] },
            { region: "간사이 지방", prefs: [ { name: "미에현", codes: ["9240"], sub: {"9240": "미에현"} }, { name: "시가현", codes: ["9250"], sub: {"9250": "시가현"} }, { name: "교토부", codes: ["9260"], sub: {"9260": "교토부"} }, { name: "오사카부", codes: ["9270"], sub: {"9270": "오사카부"} }, { name: "효고현", codes: ["9280"], sub: {"9280": "효고현"} }, { name: "나라현", codes: ["9290"], sub: {"9290": "나라현"} }, { name: "와카야마현", codes: ["9300"], sub: {"9300": "와카야마현"} } ] },
            { region: "주고쿠 지방", prefs: [ { name: "돗토리현", codes: ["9310"], sub: {"9310": "돗토리현"} }, { name: "시마네현", codes: ["9320"], sub: {"9320": "시마네현"} }, { name: "오카야마현", codes: ["9330"], sub: {"9330": "오카야마현"} }, { name: "히로시마현", codes: ["9340"], sub: {"9340": "히로시마현"} }, { name: "야마구치현", codes: ["9350"], sub: {"9350": "야마구치현"} } ] },
            { region: "시고쿠 지방", prefs: [ { name: "도쿠시마현", codes: ["9360"], sub: {"9360": "도쿠시마현"} }, { name: "가가와현", codes: ["9370"], sub: {"9370": "가가와현"} }, { name: "에히메현", codes: ["9380"], sub: {"9380": "에히메현"} }, { name: "고치현", codes: ["9390"], sub: {"9390": "고치현"} } ] },
            { region: "규슈 지방", prefs: [ { name: "후쿠오카현", codes: ["9400"], sub: {"9400": "후쿠오카현"} }, { name: "사가현", codes: ["9410"], sub: {"9410": "사가현"} }, { name: "나가사키현", codes: ["9420"], sub: {"9420": "나가사키현"} }, { name: "구마모토현", codes: ["9430"], sub: {"9430": "구마모토현"} }, { name: "오이타현", codes: ["9440"], sub: {"9440": "오이타현"} }, { name: "미야자키현", codes: ["9450"], sub: {"9450": "미야자키현"} }, { name: "가고시마현", codes: ["9461", "9462"], sub: {"9461": "가고시마현 본토", "9462": "아마미 지방"} } ] },
            { region: "오키나와 지방", prefs: [ { name: "오키나와현", codes: ["9471", "9472", "9473", "9474"], sub: {"9471": "오키나와 본도", "9472": "다이토지마", "9473": "미야코지마", "9474": "야에야마"} } ] }
        ];

        // 시스템 전역 변수
        let activeWebSocket = null;
        let isIntentionalDisconnect = false;
        let baseGeoData = null;
        
        let EPICENTER_DICT = {}; // 진앙지 번역 딕셔너리 (41.json)
        let REGION_DICT = {};    // 지역 번역 딕셔너리 (22.json)

        // DOM 요소 캐싱
        const wsStatusEl = document.getElementById('ws-status');
        const wsDotEl = document.getElementById('ws-dot');
        const eewContainer = document.getElementById('eew-container');
        const upperInfo = document.getElementById('upper-info');
        
        // D3.js 맵 변수
        let mapProjection = d3.geoIdentity(); 
        let mapPath = d3.geoPath().projection(mapProjection);
        let mapSvg = null;
        let mapGroup = null;

        // 1. 지도 초기화
        function initMap() {
            d3.select("#map-pane").select("svg").remove();
            mapSvg = d3.select("#map-pane").append("svg").attr("width", "100%").attr("height", "100%");
            mapGroup = mapSvg.append("g");
        }
        
        // 깃허브에서 진앙지 및 지역명 동시 다운로드
        async function loadDictionaries() {
            try {
                fetch('https://raw.githubusercontent.com/monggae0319/jma-lang-ko/main/src/data/earthquake/41.json')
                    .then(res => res.json())
                    .then(data => { EPICENTER_DICT = data; console.log("✅ 깃허브 진앙지(41.json) 로드 완료!"); })
                    .catch(e => console.error("🚨 진앙지 JSON 로드 실패:", e));
                
                fetch('https://raw.githubusercontent.com/monggae0319/jma-lang-ko/main/src/data/earthquake/22.json')
                    .then(res => res.json())
                    .then(data => { REGION_DICT = data; console.log("✅ 깃허브 지역명(22.json) 로드 완료!"); })
                    .catch(e => console.error("🚨 지역명 JSON 로드 실패:", e));
            } catch (e) {
                console.error("🚨 딕셔너리 로드 실패:", e);
            }
        }

        window.addEventListener('load', () => {
            initMap();
            loadDictionaries(); // 시작 시 1회 로드
        });

        // 2. 통신 상태 업데이트
        function updateStatus(msg, isConnected) {
            wsStatusEl.textContent = msg;
            wsDotEl.className = isConnected ? 'status-dot connected' : 'status-dot';
        }

        // 3. 구글 Apps Script 연동 (JSONP 우회)
        function requestViaGoogle(action, params = "") {
            return new Promise((res, rej) => {
                const cb = 'jsonp_' + Date.now();
                window[cb] = (d) => { delete window[cb]; document.head.removeChild(s); res(d); };
                const s = document.createElement('script');
                s.src = `${GOOGLE_API_URL}?action=${action}&callback=${cb}${params}`;
                s.onerror = () => rej(new Error("통신 실패"));
                document.head.appendChild(s);
            });
        }

        // 4. DMDATA 웹소켓 연결
        async function connectWebSocket() {
            if (activeWebSocket) return;
            isIntentionalDisconnect = false;
            try {
                updateStatus("구글 서버 인증 중...", false);
                const d = await requestViaGoogle("getTicket");
                if (!d || !d.ticket) throw new Error("티켓 발급 실패");

                activeWebSocket = new WebSocket(`wss://ws.api.dmdata.jp/v2/websocket?ticket=${d.ticket}`, 'dmdata.v2');
                
                activeWebSocket.onopen = () => updateStatus("✅ DMDATA 연결됨", true);
                
                activeWebSocket.onclose = () => {
                    activeWebSocket = null;
                    if (!isIntentionalDisconnect) {
                        updateStatus("연결 끊김. 재시도 중...", false);
                        setTimeout(connectWebSocket, 5000);
                    } else {
                        updateStatus("연결 해제됨", false);
                    }
                };
                
                activeWebSocket.onmessage = (e) => {
                    const payload = JSON.parse(e.data);
                    if (payload.type === 'ping') activeWebSocket.send(JSON.stringify({ type: 'pong', pingId: payload.pingId }));
                };
            } catch (e) { 
                updateStatus("🚨 오류: " + e.message, false); 
                setTimeout(connectWebSocket, 10000); // 10초 후 재시도
            }
        }

        function disconnectWebSocket() {
            isIntentionalDisconnect = true;
            if (activeWebSocket) activeWebSocket.close();
        }

        function hideWidgets() {
            eewContainer.classList.remove('active');
            upperInfo.classList.remove('active');
        }

        // 5. 지진 데이터 파싱 및 UI 업데이트
        function processEarthquakeData(xmlString) {
            if (!xmlString) return;

            eewContainer.classList.add('active');
            upperInfo.classList.add('active');
            
            mapGroup.selectAll(".epicenter-marker-group").remove(); 
            mapGroup.selectAll(".jma-region").classed("alert", false); 

            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlString.replace(/(<\/?)[\w\-]+:/g, '$1'), "text/xml");

            const mag = xml.querySelector("Magnitude")?.textContent || "0.0";
            document.getElementById('mag-stroke').textContent = "M" + mag;
            document.getElementById('mag-fill').textContent = "M" + mag;

            const coordText = xml.querySelector("Coordinate")?.textContent || "";
            const depthMatch = coordText.match(/-(\d+)\//);
            const depthKm = depthMatch ? Math.abs(parseInt(depthMatch[1]) / 1000) : 10;
            document.getElementById('depth-stroke').textContent = depthKm + "km";
            document.getElementById('depth-fill').textContent = depthKm + "km";

            const epiCodeNode = xml.querySelector("Hypocenter Area Code") || xml.querySelector("Hypocenter Code");
            const epiNameNode = xml.querySelector("Hypocenter Area Name") || xml.querySelector("Hypocenter Name");

            let finalEpicenter = "분석 중";
            let needsTranslation = false;

            if (epiCodeNode && EPICENTER_DICT[epiCodeNode.textContent]) {
                const matched = EPICENTER_DICT[epiCodeNode.textContent];
                finalEpicenter = typeof matched === 'string' ? matched : (matched.ko || matched.name || matched);
            } 
            else if (epiNameNode) {
                finalEpicenter = epiNameNode.textContent;
                needsTranslation = true;
            }

            document.getElementById('epicenter-name').textContent = finalEpicenter;

            let triggered = new Set();
            let features = [];
            
            xml.querySelectorAll("Code").forEach(n => {
                const code = n.textContent.trim();
                const sel = d3.select("#region-" + code);
                if (!sel.empty()) {
                    sel.classed("alert", true);
                    triggered.add(code);
                    features.push(sel.datum());
                }
            });

            if (features.length > 0 && baseGeoData) {
                mapProjection.fitExtent([[30, 30], [240, 330]], { type: "FeatureCollection", features: features });
                mapGroup.selectAll("path.jma-region").attr("d", mapPath);
                
                const epicenterMatch = coordText.match(/([+-]\d+(?:\.\d+)?)([+-]\d+(?:\.\d+)?)/);
                if (epicenterMatch) {
                    const coords = [parseFloat(epicenterMatch[2]), parseFloat(epicenterMatch[1])];
                    const markerGroup = mapGroup.append("g").attr("class", "epicenter-marker-group");
                    
                    markerGroup.append("text").attr("text-anchor", "middle").attr("dominant-baseline", "central")
                        .style("fill", "none").style("stroke", "white").style("stroke-width", "3px").style("font-size", "22px").style("font-weight", "900")
                        .text("✕").attr("x", mapProjection(coords)[0]).attr("y", mapProjection(coords)[1]);
                    
                    markerGroup.append("text").attr("text-anchor", "middle").attr("dominant-baseline", "central")
                        .style("fill", "red").style("stroke", "none").style("font-size", "22px").style("font-weight", "900")
                        .text("✕").attr("x", mapProjection(coords)[0]).attr("y", mapProjection(coords)[1]);
                }
            }

            updateRegionListUI(triggered);

            if (needsTranslation && finalEpicenter !== "분석 중") {
                requestViaGoogle("translate", `&text=${encodeURIComponent(finalEpicenter)}`)
                    .then(d => { if (d && d.translated) document.getElementById('epicenter-name').textContent = d.translated; })
                    .catch(err => console.error("번역 에러:", err));
            }
        }

        // 🚨 6. 지역 코드 기반 텍스트 리스트 생성 (광역 우선 정렬)
        function updateRegionListUI(codes) {
            let listRegions = []; // 1순위: 광역 단위 (지방)
            let listPrefs = [];   // 2순위: 도도부현 단위 (현)
            let listAreas = [];   // 3순위: 세부 구역 (시/군/구)
            
            if(REGIONAL_HIERARCHY.length === 0) return; 

            // 22.json 딕셔너리 기반 지역명 번역 헬퍼
            const getRegionName = (code, fallback) => {
                if (REGION_DICT[code]) {
                    const m = REGION_DICT[code];
                    return typeof m === 'string' ? m : (m.ko || m.name || m);
                }
                return fallback; 
            };

            // 데이터를 우선 3개의 배열에 각각 나눠 담음
            REGIONAL_HIERARCHY.forEach(b => {
                const all = b.prefs.flatMap(p => p.codes);
                const match = all.filter(c => codes.has(c));
                
                if (match.length > 0) {
                    if (match.length === all.length || match.length >= 5) {
                        listRegions.push(b.region); // 1순위: 광역 담기
                    } else {
                        b.prefs.forEach(p => {
                            const mInP = p.codes.filter(c => codes.has(c));
                            if (mInP.length > 0) {
                                if (mInP.length === p.codes.length) {
                                    listPrefs.push(p.name); // 2순위: 도도부현 담기
                                } else {
                                    mInP.forEach(c => listAreas.push(getRegionName(c, p.sub[c]))); // 3순위: 세부 구역 담기
                                }
                            }
                        });
                    }
                }
            });

            // 🚨 광역 -> 현 -> 세부 구역 순서로 배열 합치기
            const finalSortedList = [...listRegions, ...listPrefs, ...listAreas];
            
            // 화면 출력
            document.getElementById('region-list').innerHTML = finalSortedList.map(r => `<span>${r}</span>`).join('');
        }

        // 7. 지도 GeoJSON 렌더링
        function renderMap(data) {
            if(!data) return;
            baseGeoData = data;
            
            const statusMsg = document.getElementById('map-status');
            if(statusMsg) statusMsg.style.display = "none";
            
            mapGroup.selectAll("*").remove(); // 기존 지도 삭제
            mapProjection = d3.geoIdentity().reflectY(true).fitExtent([[10, 10], [260, 350]], data);
            mapPath = d3.geoPath().projection(mapProjection);
            
            mapGroup.selectAll("path").data(data.features).enter().append("path")
                .attr("d", mapPath).attr("class", "jma-region").attr("id", d => "region-" + (d.properties.code || d.properties.id));
        }

        // ==========================================
        // 🚨 8. 안전한 이벤트 리스너 바인딩
        // ==========================================
        document.getElementById('debug-trigger').addEventListener('click', function() {
            document.getElementById('debug-menu').classList.toggle('active');
        });

        document.getElementById('btn-connect').addEventListener('click', connectWebSocket);
        document.getElementById('btn-disconnect').addEventListener('click', disconnectWebSocket);
        document.getElementById('btn-hide').addEventListener('click', hideWidgets);

        document.getElementById('btn-inject').addEventListener('click', function() {
            processEarthquakeData(document.getElementById('xml-input').value);
        });

        document.getElementById('map-loader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try { renderMap(JSON.parse(ev.target.result)); }
                catch(err) { alert("올바른 GeoJSON 형식이 아닙니다."); }
            };
            reader.readAsText(file);
        });
    </script>
</body>
